<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym Tracker</title>

  <link rel="stylesheet" href="styles.css">
  <!--
Bootstrap 5.3.3 used for layout and styling.
Source: https://getbootstrap.com/
-->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">Gym Tracker</span>
    </div>
  </nav>

  <!-- Server error banner -->
  <div id="serverError" class="alert alert-danger m-3 d-none" role="alert">
    Cannot reach the server. Check it is running, then try again.
  </div>

  <!-- General UI messages (success/error) -->
  <div id="uiMessage" class="alert m-3 d-none" role="alert"></div>

  <main class="container my-3">
    <div class="row g-3">
      <!-- Left: Exercises -->
      <div class="col-12 col-md-4">
        <div class="card">
          <div class="card-header">
            <div class="d-flex justify-content-between align-items-center">
              <span>Exercises</span>
            </div>
            <input id="exerciseSearch" class="form-control form-control-sm mt-2" placeholder="Search exercises...">
          </div>

          <ul id="exerciseList" class="list-group list-group-flush">
            <!-- populated by JS -->
          </ul>
        </div>

        <!-- Add exercise form -->
        <div class="card mt-3">
          <div class="card-header">Add Exercise</div>
          <div class="card-body">
            <form id="addExerciseForm">
              <div class="mb-2">
                <label class="form-label" for="exName">Name</label>
                <input class="form-control" id="exName" required />
              </div>
              <div class="mb-2">
                <label class="form-label" for="exMuscle">Muscle group</label>
                <input class="form-control" id="exMuscle" required />
              </div>
              <button class="btn btn-primary w-100" type="submit">Add Exercise</button>
            </form>
          </div>
        </div>
      </div>

      <!-- Right: Selected exercise + logs -->
      <div class="col-12 col-md-8">
        <div class="card">
          <div class="card-header">
            <span id="selectedTitle">Select an exercise</span>
          </div>
          <div class="card-body">
            <p class="mb-1"><strong>Muscle group:</strong> <span id="selectedMuscle">-</span></p>

            <hr />

            <div class="d-flex justify-content-between align-items-center">
              <h5 class="mb-0">Logs</h5>

            <select id="logSort" class="form-select form-select-sm" style="width: 180px;">
              <option value="newest" selected>Newest first</option>
              <option value="oldest">Oldest first</option>
             </select>
            </div>

          <div id="statsPanel" class="text-muted small mt-2">
            <!-- populated by JS -->
          </div>

            <div class="table-responsive">
              <table class="table table-sm">
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Weight (kg)</th>
                    <th>Reps</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="logsTableBody">
                  <!-- populated by JS -->
                </tbody>
              </table>
            </div>

            <hr />

            <h5>Add Log</h5>
            <form id="addLogForm">
              <div class="row g-2">
                <div class="col-12 col-md-4">
                  <label class="form-label" for="logDate">Date</label>
                  <input class="form-control" id="logDate" type="date" required />
                </div>
                <div class="col-6 col-md-4">
                  <label class="form-label" for="logWeight">Weight (kg)</label>
                  <input class="form-control" id="logWeight" type="number" step="0.5" min="0" required />
                </div>
                <div class="col-6 col-md-4">
                  <label class="form-label" for="logReps">Reps</label>
                  <input class="form-control" id="logReps" type="number" min="0" required />
                </div>
              </div>

              <button id="addLogBtn" class="btn btn-success mt-3" type="submit" disabled>
                Add Log to Selected Exercise
              </button>
            </form>
          </div>
        </div>
      </div>

    </div>
  </main>

 <!-- Edit Log Modal -->
<div class="modal fade" id="editLogModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <form class="modal-content" id="editLogForm">
      <div class="modal-header">
        <h5 class="modal-title">Edit Log</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <!-- Hidden field to store which log we are editing -->
        <input type="hidden" id="editLogId" />

        <div class="mb-2">
          <label class="form-label" for="editLogDate">Date</label>
          <input class="form-control" id="editLogDate" type="date" required />
        </div>

        <div class="mb-2">
          <label class="form-label" for="editLogWeight">Weight (kg)</label>
          <input class="form-control" id="editLogWeight" type="number" step="0.5" min="0" required />
        </div>

        <div class="mb-2">
          <label class="form-label" for="editLogReps">Reps</label>
          <input class="form-control" id="editLogReps" type="number" min="0" required />
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary">Save changes</button>
      </div>
    </form>
  </div>
</div>

  <!-- Bootstrap JS (for components like modals later) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js" defer></script>

 </body>
</html>
